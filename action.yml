---
name: "Sccache Action"
description: "Setup sccache action"
author: "mozilla"
inputs:
  version:
    description: "The installed sccache version. Use the latest version from the Forgejo package registry if not specified."
  disable_annotations:
    description: "Disable annotation generation in post-run."
    default: 'false'
  server:
    description: "Forgejo server URL where sccache packages are stored"
    default: 'https://git.tomfos.tr'
  owner:
    description: "Owner/organisation name where sccache packages are stored"
    default: 'tom'
runs:
  using: "node20"
  main: "dist/setup/index.js"
  post: "dist/show_stats/index.js"
branding:
  icon: "star"
  color: "orange"
